name: daksha
description: "Daksha â€” on-device Socratic study buddy for grades 5â€“8."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.9.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # Core dependencies
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  sqlcipher_flutter_libs: ^0.6.0
  drift: ^2.32.0
  flutter_secure_storage: ^10.0.0
  cryptography: ^2.7.0
  path_provider: ^2.1.3
  path: ^1.9.0
  image_picker: ^1.2.2
  image_cropper: ^12.2.1
  image: ^4.2.0
  google_mlkit_text_recognition: ^0.13.0
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2
  flutter_gemma: ^0.14.1
  uuid: ^4.4.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  llama_cpp_dart: ^0.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0

  # Build and code generation
  build_runner: ^2.4.0
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  drift_dev: ^2.32.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/taxonomy/
    - assets/i18n/

  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700

    - family: DMMono
      fonts:
        - asset: assets/fonts/DMMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMMono-Medium.ttf
          weight: 500

    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
          weight: 400

    - family: NotoSansMalayalam
      fonts:
        - asset: assets/fonts/NotoSansMalayalam-Regular.ttf
          weight: 400

