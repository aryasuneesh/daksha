org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
gradle.user.home=/home/user/.gradle
org.gradle.caching=true

# 16 KB page-size compatibility (Android 15+ devices like Pixel 9 Pro XL when
# booted with "Boot with 16KB page size" in developer options). Pairs with
# `useLegacyPackaging = false` in app/build.gradle.kts. Stores native libs
# uncompressed and lets AGP zipalign them to 16 KB boundaries so the kernel
# can mmap them directly. Does not fix .so files whose ELF segments were
# linked with --max-page-size=4096 — those need an upstream rebuild.
android.bundle.enableUncompressedNativeLibs=true
